# genie nginx config — IP 직접 접근(default_server) 패턴
# 적용 방법: /etc/nginx/sites-available/genie 로 복사 후 symlink + reload.
# 자세한 1회 설치 절차는 docs/infra.md 참조.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/genie;
    index index.html;

    # Next.js static export — _next/* hash 파일은 long cache
    location /_next/static/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 정적 라우팅 — export 산출물 (page.html, 404.html, index.html)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 백엔드 API — uvicorn(127.0.0.1:8000) reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 healthcheck(/health) — health 라우터는 prefix 없이 등록됨
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
